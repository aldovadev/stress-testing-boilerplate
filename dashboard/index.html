<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K6 Dashboard</title>
  <link rel="icon" type="image/png" href="/images/logo_dark.png" />
  <script>
    // Prevent FOUC: apply saved theme immediately
    (function () {
      var t = localStorage.getItem('k6-dashboard-theme');
      if (t === 'light') document.documentElement.classList.remove('dark');
      else document.documentElement.classList.add('dark');
    })();
  </script>
</head>

<body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 antialiased transition-colors duration-200">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
